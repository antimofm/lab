<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The sky when…</title>
<style>
  :root { --fg:#f2eee8; --dim:rgba(242,238,232,0.6); --line:rgba(242,238,232,0.16); --accent:#ff6a4a; }
  * { box-sizing:border-box; }
  html, body { margin:0; height:100%; color:var(--fg); background:#0a0608;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif; -webkit-font-smoothing:antialiased; overflow:hidden; }
  iframe.sky { position:fixed; inset:0; width:100vw; height:100vh; border:0; z-index:0; }
  .veil { position:fixed; inset:0; z-index:1; pointer-events:none;
    background:linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0) 40%, rgba(0,0,0,0) 60%, rgba(0,0,0,0.5)); }

  .wrap { position:fixed; inset:0; z-index:2; display:grid; grid-template-rows:auto 1fr auto;
    padding:28px 28px 20px; pointer-events:none; }
  .wrap > * { pointer-events:auto; }
  header { display:flex; justify-content:space-between; align-items:baseline; }
  .brand { font-size:12px; letter-spacing:0.22em; text-transform:uppercase; color:var(--dim); }
  .brand b { color:var(--fg); font-weight:500; }

  .center { align-self:center; max-width:560px; margin:0 auto; width:100%; }
  .eyebrow { font-size:11px; letter-spacing:0.24em; text-transform:uppercase; color:var(--dim); text-align:center; margin-bottom:14px; }
  h1 { margin:0 0 24px; font-size:clamp(30px, 4.5vw, 48px); font-weight:500; letter-spacing:-0.01em; line-height:1.06; text-align:center; }
  h1 em { font-style:normal; color:var(--accent); }

  .card {
    background:rgba(0,0,0,0.4); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border:1px solid var(--line); border-radius:14px; padding:18px 20px;
  }
  .row { display:flex; gap:10px; margin-bottom:10px; align-items:center; }
  .row label { width:64px; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); }
  .row input {
    flex:1; background:rgba(0,0,0,0.35); color:var(--fg); border:1px solid var(--line);
    border-radius:8px; padding:8px 10px; font-family:inherit; font-size:13px;
  }
  .row input::placeholder { color:var(--dim); }
  .two { display:flex; gap:10px; flex:1; }
  .two input { flex:1; }
  .actions { display:flex; gap:10px; margin-top:6px; }
  .btn {
    flex:1; font-size:12px; letter-spacing:0.14em; text-transform:uppercase;
    padding:11px 16px; border:1px solid var(--line); border-radius:8px;
    color:var(--fg); background:rgba(0,0,0,0.3); cursor:pointer; font-family:inherit;
  }
  .btn:hover { border-color:var(--fg); }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#0a0608; font-weight:500; }
  .btn.primary:hover { background:#ff8769; border-color:#ff8769; }

  .link-out { text-align:center; margin-top:12px; font-size:12px; color:var(--dim); }
  .link-out a { color:var(--fg); }
  .sub { margin:0 auto 22px; max-width:480px; text-align:center; font-size:14px; line-height:1.55; color:rgba(242,238,232,0.8); }

  footer { text-align:center; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); }
  footer a { color:var(--dim); text-decoration:none; }
  footer a:hover { color:var(--fg); }

  .hidden { display:none; }
</style>
</head>
<body>

<iframe id="sky" class="sky" src="/sky.html?embed=1&h=7&c=0.25&ct=1&hz=0.25&r=0.5&ss=1.8&hz2=1"></iframe>
<div class="veil"></div>

<div class="wrap">
  <header>
    <div class="brand"><b>the sky when</b> · studio artefact</div>
    <div class="brand"><a href="/" style="color:inherit;text-decoration:none;">← lab</a></div>
  </header>

  <div class="center">
    <div class="eyebrow">A moment, frozen</div>
    <h1>The sky when <em>it mattered</em>.</h1>
    <p class="sub">
      Pick a date, time, and place. We'll render the sky exactly as it was —
      real sun, real moon, real shadows. Shareable. Printable.
    </p>

    <div class="card">
      <div class="row">
        <label>When</label>
        <div class="two">
          <input id="date" type="date" />
          <input id="time" type="time" value="19:30" />
        </div>
      </div>
      <div class="row">
        <label>Where</label>
        <input id="place" type="text" placeholder="London, Rome, Tokyo…" value="London" />
      </div>
      <div class="actions">
        <button class="btn" id="surprise">Surprise me</button>
        <button class="btn primary" id="render">Render sky</button>
      </div>
      <div class="link-out hidden" id="linkBox">
        Share: <a id="shareLink" href="#" target="_blank">open</a>
        · <a id="downloadLink" href="#">download sky</a>
      </div>
    </div>
  </div>

  <footer>
    RED studio · <a href="/sky.html">sky engine</a> · <a href="/">lab</a>
  </footer>
</div>

<script>
document.getElementById('date').value = new Date().toISOString().slice(0,10);

async function geocode(name){
  const u = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(name)}`;
  const r = await fetch(u, { headers: { 'Accept-Language': 'en' } });
  const j = await r.json();
  if (!j || !j.length) return null;
  return { lat: parseFloat(j[0].lat), lon: parseFloat(j[0].lon), label: j[0].display_name };
}

function buildSkyURL({ hour, date, lat, lon, embed = true }){
  const p = new URLSearchParams({
    h: hour.toFixed(2), d: date, lat: lat.toFixed(3), lon: lon.toFixed(3),
    c: 0.3, ct: 1, hz: 0.25, r: 0.5, ss: 1.8, hz2: 1, b: 1,
  });
  if (embed) p.set('embed', '1');
  return '/sky.html?' + p.toString();
}

async function render(){
  const d = document.getElementById('date').value;
  const t = document.getElementById('time').value;
  const place = document.getElementById('place').value.trim();
  if (!d || !t || !place) return;
  const [hh, mm] = t.split(':').map(Number);
  const hour = hh + mm / 60;
  const geo = await geocode(place);
  if (!geo) return;
  const previewURL = buildSkyURL({ hour, date: d, lat: geo.lat, lon: geo.lon, embed: true });
  document.getElementById('sky').src = previewURL;
  const shareURL = buildSkyURL({ hour, date: d, lat: geo.lat, lon: geo.lon, embed: false });
  document.getElementById('shareLink').href = shareURL;
  document.getElementById('downloadLink').href = shareURL;
  document.getElementById('linkBox').classList.remove('hidden');
}
document.getElementById('render').addEventListener('click', render);

const surprises = [
  { place: 'Reykjavík', hour: 23.5 },
  { place: 'Kampala',   hour: 18.6 },
  { place: 'Tokyo',     hour: 5.2  },
  { place: 'Rome',      hour: 20.3 },
  { place: 'Lode, UK',  hour: 4.7  },
  { place: 'Sydney',    hour: 6.4  },
];
document.getElementById('surprise').addEventListener('click', () => {
  const s = surprises[Math.floor(Math.random() * surprises.length)];
  document.getElementById('place').value = s.place;
  const hh = String(Math.floor(s.hour)).padStart(2,'0');
  const mm = String(Math.round((s.hour - Math.floor(s.hour))*60)).padStart(2,'0');
  document.getElementById('time').value = `${hh}:${mm}`;
  render();
});
</script>

</body>
</html>
