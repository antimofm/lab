<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slide Script</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-size: 60px;
  --slide-w: 2.75em;
  --accent: #2E86FF;
}

html, body { height: 100%; }

body {
  background: #e8e8e8;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif;
  display: flex;
  flex-direction: column;
}

/* Stage centers content, scrolls when content overflows */
#stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 10vw;
  position: relative;
  overflow-y: auto;
  min-height: 0;
}

#editor {
  font-size: var(--font-size);
  font-weight: 800;
  line-height: 1.22;
  letter-spacing: -0.025em;
  color: #111;
  outline: none;
  text-align: center;
  word-break: break-word;
  max-width: 1000px;
  width: 100%;
  cursor: text;
}

/* ── Inline slide ── */
.slide-inline {
  display: inline-block;
  vertical-align: middle;
  width: var(--slide-w);
  max-width: 80vw;
  margin: 0 0.1em;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
}

.slide-inline img {
  width: 100%;
  height: auto;
  border-radius: 6px;
  display: block;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

.slide-inline .del-btn {
  position: absolute;
  top: -10px; right: -10px;
  width: 24px; height: 24px;
  background: #111;
  color: #fff;
  border: 2.5px solid #e8e8e8;
  border-radius: 50%;
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.slide-inline:hover .del-btn { opacity: 1; }

/* ── Hover pin ── */
#slot-pin {
  position: absolute;
  display: none;
  flex-direction: column;
  align-items: center;
  transform: translate(-50%, -50%);
  cursor: pointer;
  z-index: 100;
  pointer-events: none;
}
#slot-pin.visible {
  display: flex;
  pointer-events: auto;
}

.pin-line {
  width: 2px;
  height: calc(var(--font-size) * 0.48);
  background: var(--accent);
  flex-shrink: 0;
}

.pin-circle {
  width: calc(var(--font-size) * 0.52);
  height: calc(var(--font-size) * 0.52);
  background: var(--accent);
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
  transition: transform 0.1s;
}
#slot-pin:hover .pin-circle { transform: scale(1.1); }

/* White + cross inside circle */
.pin-circle::before,
.pin-circle::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 1px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.pin-circle::before { width: 2px; height: 52%; }
.pin-circle::after  { width: 52%; height: 2px; }

/* ── Bottom bar ── */
#bottom-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px 32px;
  flex-shrink: 0;
  position: relative;
}

#density-control {
  display: flex;
  align-items: center;
  gap: 10px;
}

#density-label {
  font-size: 13px;
  font-weight: 700;
  color: #111;
  min-width: 44px;
  text-align: right;
  letter-spacing: -0.02em;
}

#density-slider {
  -webkit-appearance: none;
  width: 120px;
  height: 2px;
  background: #111;
  outline: none;
  border-radius: 1px;
  cursor: pointer;
}
#density-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  background: #111;
  border-radius: 50%;
  cursor: pointer;
}

#reset-btn {
  position: absolute;
  right: 32px;
  background: none;
  border: none;
  font-size: 13px;
  font-weight: 500;
  color: #bbb;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: -0.01em;
  transition: color 0.12s;
}
#reset-btn:hover { color: #555; }

#file-input { display: none; }
</style>
</head>
<body>

<div id="stage">
  <div id="editor" contenteditable="true" spellcheck="false"></div>
  <div id="slot-pin">
    <div class="pin-line"></div>
    <div class="pin-circle"></div>
    <div class="pin-line"></div>
  </div>
</div>

<div id="bottom-bar">
  <div id="density-control">
    <span id="density-label">60pt</span>
    <input type="range" id="density-slider" min="0" max="100" value="50">
  </div>
  <button id="reset-btn">Reset</button>
</div>

<input type="file" id="file-input" accept="image/*" multiple>

<script>
const editor   = document.getElementById('editor');
const stage    = document.getElementById('stage');
const slotPin  = document.getElementById('slot-pin');
const slider   = document.getElementById('density-slider');
const label    = document.getElementById('density-label');
const fileInput = document.getElementById('file-input');

const STORAGE_KEY = 'ss3';
const DEFAULT_HTML = 'This is text';

let insertRange = null;
let pendingRange = null;
let _n = 1;
let pinLeaveTimer = null;
let saveTimer = null;

// ── Density ──────────────────────────────────────────────────────────────────

function applyDensity(d) {
  const fs = 20 + d * 0.8; // 20→100px
  document.documentElement.style.setProperty('--font-size', fs.toFixed(1) + 'px');
  document.documentElement.style.setProperty('--slide-w', (1.5 + d * 0.025).toFixed(2) + 'em');
  label.textContent = Math.round(fs) + 'pt';
}

slider.addEventListener('input', () => { applyDensity(+slider.value); save(); });

// ── Persistence ──────────────────────────────────────────────────────────────

function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      html: editor.innerHTML,
      density: slider.value
    }));
  }, 400);
}

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      const d = JSON.parse(raw);
      slider.value = d.density ?? 50;
      applyDensity(+slider.value);
      editor.innerHTML = d.html || DEFAULT_HTML;
      return;
    } catch (e) {}
  }
  slider.value = 50;
  applyDensity(50);
  editor.innerHTML = DEFAULT_HTML;
}

editor.addEventListener('input', save);

// ── Reset ─────────────────────────────────────────────────────────────────────

document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('Reset everything?')) return;
  localStorage.removeItem(STORAGE_KEY);
  slider.value = 50;
  applyDensity(50);
  editor.innerHTML = DEFAULT_HTML;
  save();
});

// ── Hover pin ─────────────────────────────────────────────────────────────────

function hidePin() {
  slotPin.classList.remove('visible');
  insertRange = null;
}

stage.addEventListener('mousemove', (e) => {
  clearTimeout(pinLeaveTimer);

  // Don't interfere while hovering slides or the pin itself
  if (e.target.closest('.slide-inline') || e.target === slotPin || slotPin.contains(e.target)) return;

  // Only activate near the editor
  const edRect = editor.getBoundingClientRect();
  const margin = 60;
  if (e.clientX < edRect.left - margin || e.clientX > edRect.right + margin ||
      e.clientY < edRect.top  - margin || e.clientY > edRect.bottom + margin) {
    hidePin();
    return;
  }

  // Get caret position at mouse point
  let range;
  if (document.caretRangeFromPoint) {
    range = document.caretRangeFromPoint(e.clientX, e.clientY);
  } else if (document.caretPositionFromPoint) {
    const pos = document.caretPositionFromPoint(e.clientX, e.clientY);
    if (pos) { range = document.createRange(); range.setStart(pos.offsetNode, pos.offset); range.collapse(true); }
  }

  if (!range || !editor.contains(range.startContainer)) { hidePin(); return; }

  const node = range.startContainer;
  if (node.nodeType !== Node.TEXT_NODE) { hidePin(); return; }

  const text = node.textContent;
  const offset = range.startOffset;

  // Snap to nearest word boundary
  let left = offset;
  while (left > 0 && text[left - 1] !== ' ') left--;
  let right = offset;
  while (right < text.length && text[right] !== ' ') right++;
  const snapOffset = (offset - left <= right - offset) ? left : right;

  // Get pixel position of snap point
  const snapRange = document.createRange();
  snapRange.setStart(node, snapOffset);
  snapRange.collapse(true);
  const rect = snapRange.getBoundingClientRect();
  if (!rect || (rect.width === 0 && rect.height === 0)) { hidePin(); return; }

  // Position pin (centered on line mid-point at word boundary)
  const stageRect = stage.getBoundingClientRect();
  slotPin.style.left = (rect.left  - stageRect.left + stage.scrollLeft) + 'px';
  slotPin.style.top  = (rect.top   - stageRect.top  + stage.scrollTop + rect.height / 2) + 'px';
  slotPin.classList.add('visible');

  insertRange = snapRange.cloneRange();
});

stage.addEventListener('mouseleave', () => {
  pinLeaveTimer = setTimeout(hidePin, 400);
});
slotPin.addEventListener('mouseenter', () => clearTimeout(pinLeaveTimer));
slotPin.addEventListener('mouseleave', () => { pinLeaveTimer = setTimeout(hidePin, 400); });

// ── Insert slide ──────────────────────────────────────────────────────────────

slotPin.addEventListener('click', () => {
  if (!insertRange) return;
  pendingRange = insertRange.cloneRange();
  fileInput.click();
});

// Drag & drop onto stage
document.addEventListener('dragover', e => {
  if (e.dataTransfer.types.includes('Files')) e.preventDefault();
});
document.addEventListener('drop', e => {
  if (e.dataTransfer.files.length) {
    e.preventDefault();
    insertFiles(Array.from(e.dataTransfer.files));
  }
});

fileInput.addEventListener('change', () => {
  insertFiles(Array.from(fileInput.files));
  fileInput.value = '';
});

function insertFiles(files) {
  files.filter(f => f.type.startsWith('image/')).forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const id = 'sl' + (_n++);
      const span = document.createElement('span');
      span.className = 'slide-inline';
      span.dataset.id = id;
      span.contentEditable = 'false';
      span.innerHTML = `<img src="${ev.target.result}"><button class="del-btn">×</button>`;

      // Zero-width space gives the cursor a text node to land on either side
      const zws = document.createTextNode('​');

      const target = pendingRange || insertRange;
      if (target) {
        target.insertNode(zws);
        target.insertNode(span);
        const after = document.createRange();
        after.setStartAfter(zws);
        after.collapse(true);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(after);
      } else {
        editor.appendChild(span);
        editor.appendChild(zws);
      }
      pendingRange = null;

      hidePin();
      save();
    };
    reader.readAsDataURL(file);
  });
}

// Delete slide (event delegation)
editor.addEventListener('click', e => {
  if (e.target.classList.contains('del-btn')) {
    e.target.closest('.slide-inline').remove();
    save();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────

load();
</script>
</body>
</html>
