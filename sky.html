<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sky — time, season, place</title>
<style>
  :root { --fg:#f0f0f0; --dim:#8a8a8a; --line:rgba(255,255,255,0.12); --panel:rgba(10,10,12,0.55); }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:#000; color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif; overflow:hidden; }
  canvas { display:block; width:100vw; height:100vh; position:fixed; inset:0; z-index:0; }

  .panel {
    position:fixed; left:16px; bottom:16px; z-index:2; width:min(360px, calc(100vw - 32px));
    background:var(--panel); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    border:1px solid var(--line); border-radius:14px; padding:16px 18px;
    font-size:13px;
  }
  .panel h2 { margin:0 0 4px; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); font-weight:500; }
  .readout { font-size:13px; color:var(--dim); margin-bottom:14px; }
  .readout b { color:var(--fg); font-weight:500; }

  .row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .row label { width:58px; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--dim); }
  .row input[type=range] { flex:1; accent-color:#c8102e; }
  .row input[type=number], .row select {
    background:rgba(0,0,0,0.4); color:var(--fg); border:1px solid var(--line);
    border-radius:6px; padding:4px 8px; font-size:12px; width:84px;
    font-family:inherit;
  }
  .row .val { width:56px; text-align:right; color:var(--fg); font-variant-numeric:tabular-nums; font-size:12px; }
  .presets { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .chip { font-size:11px; padding:4px 10px; border:1px solid var(--line); border-radius:999px;
    color:var(--dim); background:transparent; cursor:pointer; }
  .chip:hover { color:var(--fg); border-color:var(--fg); }
  .toggle { display:flex; gap:10px; align-items:center; margin-top:10px; }
  .toggle label { display:flex; gap:6px; align-items:center; cursor:pointer; font-size:12px; color:var(--dim); }
  .toggle input { accent-color:#c8102e; }

  .top-info {
    position:fixed; right:16px; top:16px; z-index:2;
    background:var(--panel); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    border:1px solid var(--line); border-radius:10px; padding:10px 14px; font-size:12px; color:var(--dim);
    font-variant-numeric:tabular-nums;
  }
  .top-info b { color:var(--fg); font-weight:500; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="top-info" id="info">sun —° · moon —°</div>

<div class="panel">
  <h2>Sky</h2>
  <div class="readout" id="readout">—</div>

  <div class="row">
    <label>Hour</label>
    <input id="hour" type="range" min="0" max="24" step="0.05" value="12" />
    <span class="val" id="hourVal">12:00</span>
  </div>
  <div class="row">
    <label>Date</label>
    <input id="date" type="date" style="width:130px" />
  </div>
  <div class="row">
    <label>Lat</label>
    <input id="lat" type="number" step="0.5" value="51.5" />
    <label style="width:auto">Lon</label>
    <input id="lon" type="number" step="0.5" value="-0.1" />
  </div>
  <div class="presets">
    <span class="chip" data-lat="51.5" data-lon="-0.1">London</span>
    <span class="chip" data-lat="41.9" data-lon="12.5">Rome</span>
    <span class="chip" data-lat="35.7" data-lon="139.7">Tokyo</span>
    <span class="chip" data-lat="-33.9" data-lon="151.2">Sydney</span>
    <span class="chip" data-lat="64.1" data-lon="-21.9">Reykjavík</span>
    <span class="chip" data-lat="0.3" data-lon="32.6">Kampala</span>
  </div>
  <div class="toggle">
    <label><input type="checkbox" id="shimmer" checked /> horizon shimmer</label>
    <label><input type="checkbox" id="play" /> animate</label>
  </div>
</div>

<!-- SunCalc for sun + moon positions and phase -->
<script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.min.js"></script>
<script>
// ---------- shader source ----------
const vsrc = `#version 300 es
in vec2 p; void main() { gl_Position = vec4(p, 0.0, 1.0); }`;

const fsrc = `#version 300 es
precision highp float;
out vec4 outColor;

uniform vec2  uRes;
uniform float uTime;
uniform float uSunAlt;      // radians, -pi/2..pi/2
uniform float uSunAz;       // radians (az around south, we center south)
uniform float uMoonAlt;
uniform float uMoonAz;
uniform float uMoonPhase;   // 0..1 (SunCalc: 0 new, 0.5 full, 1 new)
uniform float uMoonIllum;   // 0..1 fraction illuminated
uniform float uShimmer;     // 0 or 1

#define PI 3.14159265359

// pseudo random / noise for subtle grain and shimmer
float hash(vec2 p){ p = fract(p*vec2(123.34, 456.21)); p += dot(p, p+45.32); return fract(p.x*p.y); }
float noise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  float a = hash(i), b = hash(i+vec2(1,0)), c = hash(i+vec2(0,1)), d = hash(i+vec2(1,1));
  vec2 u = f*f*(3.0-2.0*f);
  return mix(a,b,u.x) + (c-a)*u.y*(1.0-u.x) + (d-b)*u.x*u.y;
}

// angular distance between two sky directions given by (alt, az)
float angDist(float a1, float z1, float a2, float z2){
  float c = sin(a1)*sin(a2) + cos(a1)*cos(a2)*cos(z1 - z2);
  return acos(clamp(c, -1.0, 1.0));
}

void main(){
  vec2 uv = gl_FragCoord.xy / uRes;
  vec2 aspect = vec2(uRes.x/uRes.y, 1.0);

  // Map screen to sky direction:
  //   horizontal covers +/-90 deg of azimuth around south (so full 180° field)
  //   vertical covers 0..90 deg altitude (horizon at bottom)
  float viewAz = (uv.x - 0.5) * PI;            // -pi/2..pi/2, centered on south
  float viewAlt = uv.y * (PI * 0.5);           // 0..pi/2

  // shimmer: warp viewAz near horizon
  if (uShimmer > 0.5) {
    float horizonMask = 1.0 - smoothstep(0.0, 0.12, viewAlt);
    float n = noise(vec2(uv.x * 60.0, uTime*0.6));
    float warp = (n - 0.5) * 0.015 * horizonMask;
    viewAz += warp;
    viewAlt += warp * 0.5;
  }

  // sun altitude drives day/night blend
  float day      = smoothstep(-0.08, 0.18, uSunAlt);           // full day
  float twilight = smoothstep(-0.35, 0.0, uSunAlt) * (1.0 - smoothstep(0.0, 0.25, uSunAlt));
  float civilDusk= smoothstep(-0.25, 0.05, uSunAlt);

  // vertical position 0=horizon, 1=zenith
  float h = clamp(viewAlt / (PI*0.5), 0.0, 1.0);

  // Palettes
  vec3 dayZenith    = vec3(0.16, 0.38, 0.78);
  vec3 dayHorizon   = vec3(0.75, 0.88, 1.00);
  vec3 sunsetZenith = vec3(0.22, 0.18, 0.42);
  vec3 sunsetHorizon= vec3(1.00, 0.52, 0.22);
  vec3 nightZenith  = vec3(0.012, 0.018, 0.055);
  vec3 nightHorizon = vec3(0.04, 0.06, 0.13);

  vec3 dayC    = mix(dayHorizon, dayZenith, pow(h, 0.7));
  vec3 sunsetC = mix(sunsetHorizon, sunsetZenith, pow(h, 0.55));
  vec3 nightC  = mix(nightHorizon, nightZenith, pow(h, 0.5));

  // asymmetric sunset tint: hotter near sun azimuth
  float azDelta = abs(viewAz - uSunAz);
  float sunsetLean = exp(-azDelta * 1.4);
  sunsetC = mix(sunsetC, sunsetC * vec3(1.1, 0.95, 0.85) + vec3(0.15,0.05,0.0)*sunsetLean, sunsetLean*0.7);

  // Blend: night -> sunset (twilight) -> day
  vec3 sky = mix(nightC, sunsetC, twilight);
  sky = mix(sky, dayC, day);

  // --- Stars at night ---
  float nightF = 1.0 - civilDusk;
  if (nightF > 0.001) {
    vec2 sp = vec2(viewAz * 5.0, viewAlt * 5.0);
    float star = 0.0;
    float n1 = hash(floor(sp * 80.0));
    if (n1 > 0.992) star = pow((n1 - 0.992) / 0.008, 2.0);
    float twinkle = 0.6 + 0.4 * sin(uTime*2.0 + n1*50.0);
    sky += vec3(0.9, 0.95, 1.0) * star * twinkle * nightF;
  }

  // --- Sun disk + glow ---
  float sunAngDist = angDist(viewAlt, viewAz, uSunAlt, uSunAz);
  float sunDisk = smoothstep(0.012, 0.008, sunAngDist);
  float sunGlow = exp(-sunAngDist * 8.0) * 0.5
                + exp(-sunAngDist * 2.5) * 0.25;
  // sun color shifts with altitude
  vec3 sunColor = mix(vec3(1.0, 0.55, 0.25), vec3(1.0, 0.98, 0.92), smoothstep(0.0, 0.35, uSunAlt));
  // dim when below horizon
  float sunVisible = smoothstep(-0.03, 0.01, uSunAlt);
  sky += (sunDisk * 1.8 + sunGlow * 0.7) * sunColor * sunVisible;

  // --- Moon disk + phase ---
  float moonAngDist = angDist(viewAlt, viewAz, uMoonAlt, uMoonAz);
  float moonR = 0.013;
  float moonDisk = smoothstep(moonR, moonR - 0.003, moonAngDist);
  // phase shadow: offset a dark disk to simulate terminator
  // phase 0 = new, 0.25 = first qtr, 0.5 = full, 0.75 = last qtr
  float phase = uMoonPhase;
  // offset direction: sign flips at 0.5
  float dir = (phase < 0.5) ? 1.0 : -1.0;
  float shadowShift = (0.5 - abs(phase - 0.5)) * 2.0; // 0..1..0
  // coordinate local to moon
  vec2 moonLocal = vec2(viewAz - uMoonAz, viewAlt - uMoonAlt);
  float shadowDist = length(moonLocal + vec2(dir * shadowShift * moonR * 0.95, 0.0));
  float moonLit = moonDisk * smoothstep(moonR - 0.002, moonR + 0.001, shadowDist);
  // subtle moon glow scales with illumination and darkness of sky
  float moonGlow = exp(-moonAngDist * 50.0) * 0.35 * uMoonIllum * (1.0 - day);
  float moonVisible = smoothstep(-0.03, 0.01, uMoonAlt);
  vec3 moonColor = vec3(0.96, 0.96, 0.92);
  sky += (moonLit * 1.1 + moonGlow) * moonColor * moonVisible;

  // subtle film grain
  sky += (hash(gl_FragCoord.xy + uTime) - 0.5) * 0.008;

  outColor = vec4(sky, 1.0);
}
`;

// ---------- setup ----------
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: true });
if (!gl) { document.body.innerHTML = "WebGL2 not available."; throw new Error("no webgl2"); }

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s)); throw new Error("shader compile");
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vsrc));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fsrc));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { console.error(gl.getProgramInfoLog(prog)); }
gl.useProgram(prog);

const vao = gl.createVertexArray(); gl.bindVertexArray(vao);
const vbo = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const U = {
  res: gl.getUniformLocation(prog, 'uRes'),
  time: gl.getUniformLocation(prog, 'uTime'),
  sunAlt: gl.getUniformLocation(prog, 'uSunAlt'),
  sunAz:  gl.getUniformLocation(prog, 'uSunAz'),
  moonAlt: gl.getUniformLocation(prog, 'uMoonAlt'),
  moonAz:  gl.getUniformLocation(prog, 'uMoonAz'),
  moonPhase: gl.getUniformLocation(prog, 'uMoonPhase'),
  moonIllum: gl.getUniformLocation(prog, 'uMoonIllum'),
  shimmer: gl.getUniformLocation(prog, 'uShimmer'),
};

function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = Math.floor(window.innerWidth  * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize); resize();

// ---------- state ----------
const el = {
  hour: document.getElementById('hour'),
  hourVal: document.getElementById('hourVal'),
  date: document.getElementById('date'),
  lat:  document.getElementById('lat'),
  lon:  document.getElementById('lon'),
  shimmer: document.getElementById('shimmer'),
  play: document.getElementById('play'),
  readout: document.getElementById('readout'),
  info: document.getElementById('info'),
};
const today = new Date();
el.date.value = today.toISOString().slice(0,10);

document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    el.lat.value = c.dataset.lat;
    el.lon.value = c.dataset.lon;
  });
});

function currentDate(){
  const [y,m,d] = el.date.value.split('-').map(Number);
  const h = parseFloat(el.hour.value);
  const hh = Math.floor(h), mm = Math.round((h - hh)*60);
  return new Date(Date.UTC(y, m-1, d, hh - tzOffsetHours(), mm));
}
function tzOffsetHours(){
  // approximate local timezone from longitude so sliders feel local
  return Math.round(parseFloat(el.lon.value) / 15);
}

function fmtHour(h){
  const hh = Math.floor(h), mm = Math.round((h - hh)*60);
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}
function deg(rad){ return rad * 180 / Math.PI; }

function seasonLabel(date, lat){
  // northern meteorological seasons; flipped for southern
  const m = date.getUTCMonth() + 1;
  const north = (m>=3&&m<=5) ? 'spring' : (m>=6&&m<=8) ? 'summer' : (m>=9&&m<=11) ? 'autumn' : 'winter';
  const south = {spring:'autumn', summer:'winter', autumn:'spring', winter:'summer'}[north];
  return lat >= 0 ? north : south;
}

let t0 = performance.now();
let animTime = 0;
let lastFrame = t0;

function frame(now){
  const dt = (now - lastFrame) / 1000; lastFrame = now;
  if (el.play.checked) {
    let h = parseFloat(el.hour.value) + dt * 0.5; // 0.5 hours per real second
    if (h >= 24) h -= 24;
    el.hour.value = h.toFixed(2);
  }

  const h = parseFloat(el.hour.value);
  el.hourVal.textContent = fmtHour(h);
  const lat = parseFloat(el.lat.value);
  const lon = parseFloat(el.lon.value);
  const date = currentDate();

  const sun = SunCalc.getPosition(date, lat, lon);
  const moon = SunCalc.getMoonPosition(date, lat, lon);
  const moonI = SunCalc.getMoonIllumination(date);

  gl.uniform2f(U.res, canvas.width, canvas.height);
  gl.uniform1f(U.time, (now - t0) / 1000);
  gl.uniform1f(U.sunAlt, sun.altitude);
  gl.uniform1f(U.sunAz,  sun.azimuth); // SunCalc: 0 = south, +west
  gl.uniform1f(U.moonAlt, moon.altitude);
  gl.uniform1f(U.moonAz,  moon.azimuth);
  gl.uniform1f(U.moonPhase, moonI.phase);
  gl.uniform1f(U.moonIllum, moonI.fraction);
  gl.uniform1f(U.shimmer, el.shimmer.checked ? 1.0 : 0.0);

  gl.drawArrays(gl.TRIANGLES, 0, 3);

  // readouts
  const season = seasonLabel(date, lat);
  el.readout.innerHTML =
    `<b>${fmtHour(h)}</b> · ${el.date.value} · <b>${season}</b> · ${lat.toFixed(1)}°, ${lon.toFixed(1)}°`;
  el.info.innerHTML =
    `sun <b>${deg(sun.altitude).toFixed(1)}°</b> alt · ` +
    `moon <b>${deg(moon.altitude).toFixed(1)}°</b> alt · ` +
    `illum <b>${Math.round(moonI.fraction*100)}%</b>`;

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
