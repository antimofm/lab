<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Redshift · RED</title>
<style>
  :root { --fg:#f7ece3; --dim:rgba(247,236,227,0.55); --line:rgba(247,236,227,0.18); }
  * { box-sizing:border-box; }
  html, body { margin:0; height:100%; color:var(--fg); background:#0a0608;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",ui-sans-serif,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; overflow:hidden; }
  iframe.sky { position:fixed; inset:0; width:100vw; height:100vh; border:0; z-index:0; }
  .veil {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:
      radial-gradient(ellipse at 50% 110%, rgba(0,0,0,0.5), rgba(0,0,0,0) 55%),
      linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0) 35%);
  }
  .layer { position:fixed; z-index:2; color:var(--fg); pointer-events:none; }
  .layer > * { pointer-events:auto; }

  .brand {
    top:32px; left:40px;
    font-size:12px; letter-spacing:0.28em; text-transform:uppercase;
  }
  .title {
    bottom:48px; left:40px; max-width:640px;
  }
  .title .eyebrow { font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--dim); margin-bottom:14px; }
  .title h1 { margin:0 0 10px; font-size:clamp(36px, 5vw, 64px); font-weight:500; letter-spacing:-0.01em; line-height:1.05; }
  .title p  { margin:0; font-size:14px; line-height:1.55; color:rgba(247,236,227,0.78); max-width:520px; }

  .meta {
    top:32px; right:40px; text-align:right;
    font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim);
    font-variant-numeric:tabular-nums;
  }
  .meta b { color:var(--fg); font-weight:500; }

  .dock {
    bottom:32px; right:40px;
    display:flex; gap:8px;
  }
  .pill {
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    padding:8px 14px; border:1px solid var(--line); border-radius:999px;
    color:var(--fg); text-decoration:none;
    background:rgba(0,0,0,0.28);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    transition:border-color .25s;
  }
  .pill:hover { border-color:var(--fg); }

  @media (max-width:640px) {
    .brand, .meta, .title, .dock { left:20px; right:20px; }
    .title { bottom:32px; }
    .meta { top:auto; bottom:120px; text-align:left; }
    .dock { bottom:20px; }
  }
</style>
</head>
<body>

<iframe class="sky" src="/sky.html?embed=1&h=5.9&c=0.38&ct=1&hz=0.4&r=0.55&ss=2.3&hz2=0&w=4&b=1"></iframe>
<div class="veil"></div>

<div class="layer brand">RED · studio atmosphere</div>

<div class="layer meta" id="meta">
  <div><b id="when">—</b></div>
  <div id="where">—</div>
</div>

<div class="layer title">
  <div class="eyebrow">Redshift</div>
  <h1>The permanent dawn of a studio that ships.</h1>
  <p>
    A living atmosphere, tuned to the red end of the spectrum —
    the colour of possibility just before a day begins.
    Sit here for as long as you like.
  </p>
</div>

<div class="layer dock">
  <a class="pill" href="/sky-next.html">Interactive</a>
  <a class="pill" href="/studio/">Studio</a>
  <a class="pill" href="/">Lab</a>
</div>

<script>
  // Gently cycle the sky through dawn over ~6 minutes, looping.
  const iframe = document.querySelector('iframe.sky');
  const meta = document.getElementById('when');
  const where = document.getElementById('where');
  const t0 = Date.now();
  function loop(){
    const t = ((Date.now() - t0) / 1000) % 360; // 6 min cycle
    const hour = 5.2 + (t / 360) * 1.4; // 05:12 → 06:36
    const hh = String(Math.floor(hour)).padStart(2,'0');
    const mm = String(Math.round((hour - Math.floor(hour))*60)).padStart(2,'0');
    iframe.src = `/sky.html?embed=1&h=${hour.toFixed(2)}&c=0.38&ct=1&hz=0.4&r=0.55&ss=2.3&hz2=0&w=4&b=1`;
    meta.textContent = `${hh}:${mm}`;
    where.textContent = `51.5° N · 0.1° W · Lode, UK`;
  }
  loop();
  setInterval(loop, 20000); // refresh every 20s
</script>

</body>
</html>
