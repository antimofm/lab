<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>neynar mockup — lab / slash.red</title>
  <meta property="og:title" content="neynar cast mockup">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    a { color: #e04040; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { width: 100%; max-width: 720px; margin-bottom: 2rem; }

      width: 100%;

    video { width: 100%; height: 100%; display: block; }

<body>
  <header>
<meta name="robots" content="noindex, nofollow" />

  </header>
  <main>
    <div class="video-wrap">
      <video src="cast.mp4" autoplay loop muted playsinline></video>
    </div>
    <p class="meta">
      1080×1080 · 6s · React + <code>useCurrentFrame</code> + spring physics.
      Like count eases 0 → 9.5B with cubic easing.
    </p>
