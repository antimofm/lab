<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RED Lab</title>
<meta name="description" content="Published prototypes, guides, and experiments from RED.">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a; color: #e8e8e8;
    font: 16px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  main { max-width: 560px; width: 100%; }
  .mark { color: #e5484d; font-weight: 700; letter-spacing: 0.04em; }
  h1 { font-size: 1.05rem; font-weight: 700; margin-bottom: 1.5rem; }
  p { color: #9a9a9a; margin-bottom: 1rem; }
  ul { list-style: none; margin-top: 1.5rem; }
  li { padding: 0.6rem 0; border-top: 1px solid #1d1d1d; }
  li:last-child { border-bottom: 1px solid #1d1d1d; }
  a { color: #e8e8e8; text-decoration: none; }
  a:hover { color: #e5484d; }
  .empty { color: #5a5a5a; font-style: italic; }
  footer { margin-top: 2rem; color: #5a5a5a; font-size: 0.85rem; }
  footer a { color: #5a5a5a; }
</style>
</head>
<body>
<main>
  <h1><span class="mark">RED</span> Lab</h1>
  <p>Published prototypes, guides, and experiments. Work in the open.</p>
  <ul>
    <li class="empty">Nothing published yet — experiments land here as they ship.</li>
  </ul>
  <footer><a href="https://slash.red">slash.red</a></footer>
</main>
</body>
</html>
