<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RED · Work</title>
<style>
  :root { --fg:#f2ece2; --dim:rgba(242,236,226,0.58); --line:rgba(242,236,226,0.15); --accent:#ff6a4a; }
  * { box-sizing:border-box; }
  html, body { margin:0; color:var(--fg); background:#0a0608;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  header {
    position:sticky; top:0; z-index:5;
    display:flex; justify-content:space-between; align-items:center;
    padding:20px 32px; border-bottom:1px solid var(--line);
    background:rgba(10,6,8,0.75); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  }
  .brand { font-size:13px; letter-spacing:0.22em; font-weight:600; }
  .brand .dot { color:var(--accent); }
  nav a { color:var(--dim); font-size:12px; letter-spacing:0.16em; text-transform:uppercase; text-decoration:none; margin-left:24px; }
  nav a:hover { color:var(--fg); }

  .intro { max-width:900px; margin:0 auto; padding:80px 32px 48px; }
  .intro .eye { font-size:11px; letter-spacing:0.24em; text-transform:uppercase; color:var(--dim); margin-bottom:14px; }
  .intro h1 { margin:0 0 10px; font-size:clamp(34px, 4.5vw, 56px); font-weight:500; letter-spacing:-0.01em; line-height:1.05; }
  .intro p { color:var(--dim); max-width:560px; font-size:15px; line-height:1.6; margin:0; }

  .grid {
    display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
    gap:28px; max-width:1280px; margin:0 auto; padding:0 32px 96px;
  }
  .tile {
    border:1px solid var(--line); border-radius:14px; overflow:hidden;
    background:#0f0a0c; color:inherit; text-decoration:none; display:block;
    transition:border-color .25s, transform .25s;
  }
  .tile:hover { border-color:var(--fg); transform:translateY(-3px); }
  .tile .sky-wrap {
    position:relative; aspect-ratio:4/3; overflow:hidden;
  }
  .tile .sky-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
  .tile .sky-wrap::after {
    content:""; position:absolute; inset:0;
    background:linear-gradient(to bottom, rgba(0,0,0,0) 60%, rgba(15,10,12,0.8));
    pointer-events:none;
  }
  .tile .meta {
    position:absolute; left:16px; bottom:14px; right:16px; z-index:1; color:#fff;
    text-shadow:0 2px 10px rgba(0,0,0,0.5);
  }
  .tile .meta .k { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; opacity:0.7; margin-bottom:6px; }
  .tile .meta .n { font-size:22px; font-weight:500; letter-spacing:-0.01em; }
  .tile .body { padding:18px 20px; }
  .tile .body p { margin:0; color:var(--dim); font-size:13px; line-height:1.5; }
  .tile .loc { margin-top:12px; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); }

  footer { text-align:center; padding:24px; color:var(--dim); font-size:11px; letter-spacing:0.18em; text-transform:uppercase; border-top:1px solid var(--line); }
  footer a { color:var(--dim); text-decoration:none; }
  footer a:hover { color:var(--fg); }
</style>
</head>
<body>

<header>
  <div class="brand">RED<span class="dot">.</span></div>
  <nav>
    <a href="/studio/">Studio</a>
    <a href="/">Lab</a>
    <a href="mailto:hi@red.studio">Contact</a>
  </nav>
</header>

<section class="intro">
  <div class="eye">Selected work · 2023–2026</div>
  <h1>Projects shipped, each under its own sky.</h1>
  <p>
    Every project below carries the sky it lived under — the city it was built in,
    the hour the team was working. A portfolio as atmosphere, not just archive.
  </p>
</section>

<div class="grid" id="grid"></div>

<footer>
  Permanent dawn · <a href="/studio/">studio</a> · <a href="/">lab</a>
</footer>

<script>
const projects = [
  { slug:'flow', name:'Flow', kind:'Brand · Product', blurb:'Identity, wordmark, and landing system for a programmable asset layer.', city:'New York · 07:12', params:'h=7.2&lat=40.71&lon=-74.0&c=0.38&ct=1&hz=0.3&r=0.55&ss=2.2&hz2=2&b=1' },
  { slug:'neynar', name:'Neynar', kind:'Product', blurb:'Developer platform design for the Farcaster ecosystem.', city:'San Francisco · 18:40', params:'h=18.66&lat=37.78&lon=-122.42&c=0.35&ct=1&hz=0.4&r=0.6&ss=2.4&hz2=2&b=1' },
  { slug:'beeper', name:'Beeper', kind:'Brand', blurb:'Visual language for a universal messaging client.', city:'Lode · 04:50', params:'h=4.83&lat=52.22&lon=0.28&c=0.3&ct=1&hz=0.35&r=0.5&ss=2.0&hz2=2&b=1' },
  { slug:'runner', name:'Runner', kind:'Product', blurb:'Design partner on an execution tool for fast-moving teams.', city:'Tokyo · 05:00', params:'h=5.0&lat=35.68&lon=139.76&c=0.28&ct=1&hz=0.25&r=0.55&ss=2.1&hz2=1&b=1' },
  { slug:'radici', name:'Radici', kind:'Personal · Creative', blurb:'A studio project on roots, return, and mediterranean light.', city:'Rome · 20:24', params:'h=20.4&lat=41.9&lon=12.5&c=0.32&ct=1&hz=0.38&r=0.7&ss=2.6&hz2=2&b=1' },
  { slug:'sky', name:'Sky', kind:'Lab · Research', blurb:'Real-time atmospheric simulation. The engine running behind everything here.', city:'Lode · now', params:'h=6.0&lat=52.22&lon=0.28&c=0.32&ct=1&hz=0.3&r=0.55&ss=2.2&hz2=2&b=1' },
];
const grid = document.getElementById('grid');
for (const p of projects) {
  const a = document.createElement('a');
  a.className = 'tile';
  a.href = p.slug === 'sky' ? '/sky.html' : '#';
  a.innerHTML = `
    <div class="sky-wrap">
      <iframe loading="lazy" src="/sky.html?embed=1&${p.params}"></iframe>
      <div class="meta">
        <div class="k">${p.kind}</div>
        <div class="n">${p.name}</div>
      </div>
    </div>
    <div class="body">
      <p>${p.blurb}</p>
      <div class="loc">${p.city}</div>
    </div>
  `;
  grid.appendChild(a);
}
</script>
</body>
</html>
